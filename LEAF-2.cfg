  address-family ipv4 unicast
    network 2.2.2.2/32
  neighbor 1.1.1.1
    remote-as 65100
    update-source loopback0
    address-family l2vpn evpn
      send-community
      send-community extended
  neighbor 20.1.1.2
    remote-as 65000
    local-as 65002 no-prepend replace-as
    address-family ipv4 unicast
  vrf PROD
    address-family ipv4 unicast
      network 172.16.10.0/24
      network 172.16.20.0/24
